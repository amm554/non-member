name: Auto-assign issue to creator

# When a new issue is opened, assign it back to the person who opened it.
# Uses the built-in GITHUB_TOKEN (auto-provisioned per run) — no secrets to configure.
on:
  issues:
    types: [opened]

jobs:
  assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Assign the new issue to its author
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.issue.user.login;
            const res = await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              assignees: [author],
            });
            const assigned = (res.data.assignees || []).map(a => a.login);
            core.info(`Requested assignee: ${author}`);
            core.info(`Assignees after call: ${assigned.join(', ') || '(none)'}`);
            if (!assigned.includes(author)) {
              core.warning(
                `'${author}' was NOT assigned — most likely they are not an assignable ` +
                `user on this repo (non-collaborator / non-member). This is a GitHub ` +
                `permission rule, not a workflow error.`
              );
            }
